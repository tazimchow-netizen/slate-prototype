<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Slate Board - Visual workspace canvas">
    <title>Board - Slate</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="board.css">
</head>

<body data-theme="light">
    <header class="board-header">
        <div class="board-header-content">
            <div class="header-left">
                <a href="dashboard.html" class="logo">
                    <svg class="logo-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect width="7" height="7" x="3" y="3" rx="1" />
                        <rect width="7" height="7" x="14" y="3" rx="1" />
                        <rect width="7" height="7" x="14" y="14" rx="1" />
                        <rect width="7" height="7" x="3" y="14" rx="1" />
                    </svg>
                    <span class="logo-text">Slate</span>
                </a>
                <div class="divider-vertical"></div>
                <div class="board-info">
                    <h1 class="board-title" contenteditable="true" spellcheck="false" id="boardTitle">Untitled Board
                    </h1>
                    <span class="save-status">All changes saved</span>
                </div>
            </div>

            <div class="header-center">
                <div class="zoom-controls">
                    <button class="tool-btn" id="zoomOutBtn" aria-label="Zoom Out">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M5 12h14" />
                        </svg>
                    </button>
                    <span class="zoom-level" id="zoomLevel">100%</span>
                    <button class="tool-btn" id="zoomInBtn" aria-label="Zoom In">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M5 12h14" />
                            <path d="M12 5v14" />
                        </svg>
                    </button>
                </div>
            </div>

            <div class="header-right">

                <button class="btn-primary share-btn" id="shareBtn">Share</button>
                <div class="divider-vertical"></div>
                <button class="user-menu-btn" id="userMenuBtn" aria-label="User menu">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
                        <g fill="currentColor" fill-rule="evenodd" clip-rule="evenodd">
                            <path d="M16 9a4 4 0 1 1-8 0a4 4 0 0 1 8 0m-2 0a2 2 0 1 1-4 0a2 2 0 0 1 4 0" />
                            <path
                                d="M12 1C5.925 1 1 5.925 1 12s4.925 11 11 11s11-4.925 11-11S18.075 1 12 1M3 12c0 2.09.713 4.014 1.908 5.542A8.99 8.99 0 0 1 12.065 14a8.98 8.98 0 0 1 7.092 3.458A9 9 0 1 0 3 12m9 9a8.96 8.96 0 0 1-5.672-2.012A6.99 6.99 0 0 1 12.065 16a6.99 6.99 0 0 1 5.689 2.92A8.96 8.96 0 0 1 12 21" />
                        </g>
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Workspace -->
    <div class="workspace-container">
        <aside class="left-toolbar">
            <button class="toolbar-btn active" id="toolSelect" aria-label="Select Tool" data-tool="select">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M13 5H19V11" />
                    <path d="M19 5L5 19" />
                </svg>
                <span class="tooltip">Select (V)</span>
            </button>

            <button class="toolbar-btn" id="toolText" aria-label="Text Tool" data-tool="text">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="4 7 4 4 20 4 20 7" />
                    <line x1="9" x2="15" y1="20" y2="20" />
                    <line x1="12" x2="12" y1="4" y2="20" />
                </svg>
                <span class="tooltip">Text (T)</span>
            </button>
            <button class="toolbar-btn" id="toolChecklist" aria-label="Checklist Tool" data-tool="checklist">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                    <polyline points="9 11 12 14 22 4" />
                </svg>
                <span class="tooltip">Checklist (L)</span>
            </button>

            <button class="toolbar-btn" id="toolImage" aria-label="Image Tool" data-tool="image">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <rect width="18" height="18" x="3" y="3" rx="2" ry="2" />
                    <circle cx="9" cy="9" r="2" />
                    <path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21" />
                </svg>
                <span class="tooltip">Image (I)</span>
            </button>

            <button class="toolbar-btn" id="toolLink" aria-label="Link Tool" data-tool="link">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71" />
                    <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71" />
                </svg>
                <span class="tooltip">Link (K)</span>
            </button>
            <button class="toolbar-btn" id="toolShapes" aria-label="Shapes Tool" data-tool="shapes">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path
                        d="M8.3 10a.7.7 0 0 1-.626-1.079L11.4 3a.7.7 0 0 1 1.198-.043L16.3 8.9a.7.7 0 0 1-.572 1.1Z" />
                    <rect width="7" height="7" x="3" y="14" rx="1" />
                    <circle cx="17.5" cy="17.5" r="3.5" />
                </svg>
                <span class="tooltip">Shapes (S)</span>
            </button>

            <!-- Floating Shapes Submenu -->
            <div class="shapes-submenu" id="shapesSubmenu">
                <button class="shape-option" data-shape="square" title="Square">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2" />
                    </svg>
                </button>
                <button class="shape-option" data-shape="circle" title="Circle">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="9" />
                    </svg>
                </button>
                <button class="shape-option" data-shape="oval" title="Oval">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <ellipse cx="12" cy="12" rx="10" ry="6" />
                    </svg>
                </button>
                <button class="shape-option" data-shape="triangle" title="Triangle">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 3L21 21H3L12 3Z" />
                    </svg>
                </button>
                <button class="shape-option" data-shape="arrow" title="Arrow">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="5" y1="12" x2="19" y2="12" />
                        <polyline points="12 5 19 12 12 19" />
                    </svg>
                </button>
                <button class="shape-option" data-shape="diamond" title="Diamond">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linejoin="round">
                        <path d="M12 2L22 12L12 22L2 12Z" />
                    </svg>
                </button>
            </div>

            <button class="toolbar-btn" id="toolPen" aria-label="Pen Tool" data-tool="pen">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24">
                    <path fill="currentColor"
                        d="M8.707 19.707L18 10.414L13.586 6l-9.293 9.293a1 1 0 0 0-.263.464L3 21l5.242-1.03c.176-.044.337-.135.465-.263M21 7.414a2 2 0 0 0 0-2.828L19.414 3a2 2 0 0 0-2.828 0L15 4.586L19.414 9z" />
                </svg>
                <span class="tooltip">Pen (P)</span>
            </button>

            <div class="toolbar-bottom">
                <button class="toolbar-btn" id="toolTrash" aria-label="Trash Tool" data-tool="trash">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 6h18" />
                        <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6" />
                        <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" />
                        <line x1="10" y1="11" x2="10" y2="17" />
                        <line x1="14" y1="11" x2="14" y2="17" />
                    </svg>
                    <span class="tooltip">Delete (D)</span>
                </button>
                <button class="toolbar-btn" id="undoBtn" aria-label="Undo">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
                        <path d="M3 3v5h5" />
                    </svg>
                    <span class="tooltip">Undo (Cmd+Z)</span>
                </button>
                <button class="toolbar-btn" id="redoBtn" aria-label="Redo">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12a9 9 0 1 1-9-9 9.75 9.75 0 0 1 6.74 2.74L21 8" />
                        <path d="M21 3v5h-5" />
                    </svg>
                    <span class="tooltip">Redo (Cmd+Shift+Z)</span>
                </button>
            </div>
        </aside>

        <main class="canvas-area" id="canvasArea">
            <div class="canvas-content" id="canvasContent">
                <div class="empty-canvas-message">
                    <h3>Start creating</h3>
                    <p>Select a tool from the toolbar to begin</p>
                </div>
            </div>
        </main>
    </div>

    <script src="history.js"></script>
    <script src="drag-resize.js"></script>
    <script src="board.js"></script>
</body>

</html>
