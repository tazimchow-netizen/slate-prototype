<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Slate Dashboard - Manage your visual workspace boards">
    <title>Dashboard - Slate</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="dashboard.css">
</head>

<body data-theme="light">
    <header class="header">
        <div class="header-content">
            <button class="logo" id="logoButton" aria-label="Refresh Dashboard">
                <svg class="logo-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect width="7" height="7" x="3" y="3" rx="1" />
                    <rect width="7" height="7" x="14" y="3" rx="1" />
                    <rect width="7" height="7" x="14" y="14" rx="1" />
                    <rect width="7" height="7" x="3" y="14" rx="1" />
                </svg>
                <span class="logo-text">Slate</span>
            </button>

            <div class="header-actions">
                <a href="https://form.typeform.com/to/PxDKDj7y" target="_blank" rel="noopener" class="btn-feedback"
                    aria-label="Give Feedback">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path
                            d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z" />
                    </svg>
                    <span>Feedback</span>
                </a>
                <button class="user-menu-btn" id="userMenuBtn" aria-label="User menu">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
                        <g fill="currentColor" fill-rule="evenodd" clip-rule="evenodd">
                            <path d="M16 9a4 4 0 1 1-8 0a4 4 0 0 1 8 0m-2 0a2 2 0 1 1-4 0a2 2 0 0 1 4 0" />
                            <path
                                d="M12 1C5.925 1 1 5.925 1 12s4.925 11 11 11s11-4.925 11-11S18.075 1 12 1M3 12c0 2.09.713 4.014 1.908 5.542A8.99 8.99 0 0 1 12.065 14a8.98 8.98 0 0 1 7.092 3.458A9 9 0 1 0 3 12m9 9a8.96 8.96 0 0 1-5.672-2.012A6.99 6.99 0 0 1 12.065 16a6.99 6.99 0 0 1 5.689 2.92A8.96 8.96 0 0 1 12 21" />
                        </g>
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-container">
        <div class="dashboard-header">
            <h1 class="dashboard-title">My Boards</h1>
            <button class="btn-create" id="createBoardBtn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M5 12h14" />
                    <path d="M12 5v14" />
                </svg>
                <span>Create Board</span>
            </button>
        </div>

        <div class="search-container">
            <form class="search-form" role="search" aria-label="Search by title">
                <div class="search-input-wrapper">
                    <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8" />
                        <path d="m21 21-4.35-4.35" />
                    </svg>
                    <input type="text" id="searchInput" class="search-input" placeholder="Search by title"
                        autocomplete="off" aria-label="Search boards by name">
                    <button type="button" id="searchClear" class="search-clear" aria-label="Clear search"
                        style="display: none;">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M18 6 6 18" />
                            <path d="m6 6 12 12" />
                        </svg>
                    </button>
                </div>
            </form>
        </div>

        <div class="boards-grid" id="boardsGrid">
        </div>
    </main>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="createBoardModal" role="dialog" aria-labelledby="modalTitle" aria-modal="true">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">Create new board</h2>
                <button class="modal-close" id="modalCloseBtn" aria-label="Close modal">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 6 6 18" />
                        <path d="m6 6 12 12" />
                    </svg>
                </button>
            </div>

            <form class="modal-form" id="createBoardForm">
                <div class="form-group">
                    <label for="boardName" class="form-label">Board Name</label>
                    <input type="text" id="boardName" class="form-input" placeholder="e.g., Project Ideas" required
                        maxlength="50" autocomplete="off">
                    <span class="form-error" id="boardNameError"></span>
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn-secondary" id="modalCancelBtn">Cancel</button>
                    <button type="submit" class="btn-primary">Create</button>
                </div>
            </form>
        </div>
    </div>

    <div class="board-context-menu" id="boardContextMenu" style="display: none;">
        <button class="context-menu-item" id="renameBoard" data-action="rename">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z" />
                <path d="m15 5 4 4" />
            </svg>
            <span>Rename</span>
        </button>
        <button class="context-menu-item" id="copyBoardLink" data-action="copy">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71" />
                <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71" />
            </svg>
            <span>Copy board link</span>
        </button>
        <button class="context-menu-item" id="deleteBoardMenu" data-action="delete">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 6h18" />
                <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6" />
                <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" />
                <line x1="10" y1="11" x2="10" y2="17" />
                <line x1="14" y1="11" x2="14" y2="17" />
            </svg>
            <span>Delete</span>
        </button>
    </div>

    <div class="modal-overlay" id="renameBoardModalOverlay">
        <div class="modal" id="renameBoardModal" role="dialog" aria-labelledby="renameModalTitle" aria-modal="true">
            <div class="modal-header">
                <h2 class="modal-title" id="renameModalTitle">Rename board</h2>
                <button class="modal-close" id="renameModalCloseBtn" aria-label="Close modal">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 6 6 18" />
                        <path d="m6 6 12 12" />
                    </svg>
                </button>
            </div>

            <form class="modal-form" id="renameBoardForm">
                <div class="form-group">
                    <label for="renameBoardName" class="form-label">Board Name</label>
                    <input type="text" id="renameBoardName" class="form-input" placeholder="Enter new board name"
                        required maxlength="50" autocomplete="off">
                    <span class="form-error" id="renameBoardNameError"></span>
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn-secondary" id="renameModalCancelBtn">Cancel</button>
                    <button type="submit" class="btn-primary">Rename</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal-overlay" id="deleteBoardModalOverlay">
        <div class="modal" id="deleteBoardModal" role="dialog" aria-labelledby="deleteModalTitle" aria-modal="true">
            <div class="modal-header">
                <h2 class="modal-title" id="deleteModalTitle">Delete board</h2>
                <button class="modal-close" id="deleteModalCloseBtn" aria-label="Close modal">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 6 6 18" />
                        <path d="m6 6 12 12" />
                    </svg>
                </button>
            </div>

            <div class="modal-body">
                <p id="deleteConfirmationText">Are you sure you want to delete "<strong id="deleteBoardName"></strong>"?
                </p>
            </div>

            <div class="modal-actions">
                <button type="button" class="btn-secondary" id="deleteModalCancelBtn">Cancel</button>
                <button type="button" class="btn-danger" id="confirmDeleteBtn">Delete</button>
            </div>
        </div>
    </div>

    <script src="dashboard.js"></script>
</body>

</html>
